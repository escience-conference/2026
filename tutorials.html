---
layout: twitter
permalink: /tutorials
title: Tutorials
---

{% assign ts = site.data.tutorials | sort: "name" %}
<div class="row">
    {% for t in ts %}
    <div class="col-sm-12 col-md-12" style="margin-bottom: 3em">
        <!-- <strong style="font-size: 1.2em"><a href="{{ site.baseurl }}{{ ts.url }}">{{ t.name }}</a></strong><br /> -->
        <h3><a href="{{ ts.url }}" target="_blank">{{ ts.name }}</a></h3>
        <i class="far fa-clock"></i> {{ t.schedule }}
        <p>{{ t.abstract }}</p>
    </div>
    {% endfor %}
</div>

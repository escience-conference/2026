---
layout: twitter
permalink: /tutorials
title: Tutorials
---

{% assign ts = site.data.tutorials | sort: "name" %}
<div class="row">
    {% for t in ts %}
    <div class="col-sm-12 col-md-12" style="margin-bottom: 3em">
        <h3><a href="{{ ts.url }}" target="_blank">{{ t.name }}</a></h3>
        <!-- <i class="far fa-clock"></i> {{ t.schedule }} -->
        <strong><i class="fas fa-users"></i> {{ t.organizer }}</strong><br />
        <p>{{ t.abstract }}</p>
    </div>
    {% endfor %}
</div>

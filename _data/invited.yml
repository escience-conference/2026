  institution: National Center for Supercomputing Applications, USA
  abstract:
  biography: Daniel S. Katz is chief scientist at the National Center for Supercomputing Applications (NCSA), research professor in the Siebel School of Computing and Data Science, and research professor in the School of Information Sciences (iSchool) at the University of Illinois Urbana-Champaign. His research interests include applications, algorithms, fault tolerance, and programming in parallel and distributed computing, including HPC and cloud, and policy issues, such as citation and credit mechanisms and practices associated with software and data, organization and community practices for collaboration, and career paths for computing researchers.

- title: The Research Object Odyssey:a journey of technology, community and politics
  name: Carole Goble
  time: Sep. 30, 9.30
  chair: TBD
  institution: University of Manchester, UK
  abstract: From 2013 we have pioneered and promoted the idea of a “Research Object” as a unit of Knowledge Exchange for research. We envisioned a web of objects described and linked by metadata, each object itself a compendium of all the elements of a research investigation; the data, protocols, workflows, and tools associated with a narrative publication. 13 years later the RO-Crate is the leading form of “Webby” FAIR Digital Object; a metadata middleware framework. Its use ranges from the platform-agnostic prosaic (move an object’s metadata from one service to another, archive data, record process provenance for reproducibility) to publishing profundity (living papers, research released and dynamically updated). FAIR (Findable, Accessible, Interoperable, Reusable) certainly gave RO-Crates a boost as a mechanism for carrying actionable metadata with research entities on their journeys through the service ecosystems of science.
            Was taking Research Objects from idea to implementation and adoption straightforward? Of course not. Technical rabbit holes and political twists and turns, challenges in building and evolving a community and its processes and practices, user-developer misunderstandings, and the opportunities of AI all feature in our tale.  I will present the why and wherefore of Research Objects and RO-Crates but more importantly our odyssey, and its lessons as a form of “Translational Computer Science”). What is more, the IEEE eScience conference has had a pivotal role in our quest and success.
  biography: Carole Goble CBE FREng is a Professor of Computer Science at the University of Manchester, UK. She is a leader in Digital Research Infrastructures, translating technical innovations in distributed computing, semantic and metadata technologies, data and software sharing and computational workflows into FAIR and Open information solutions for scientists, in particular the Life Sciences and Biodiversity. She is currently:Joint Head of Node of ELIXIR-UK the national node of ELIXIR, the European Research Infrastructure for Life Science Data; and the lead of the BioFAIR Method Commons national infrastructure for life science FAIR computational workflows. She previously co-led of the Federated Analytics programme for Health Data Research UK and is a founder of the UK’s Software Sustainability Institute. Carole is an author of the seminal FAIR principles for scientific data and recipient of the Microsoft Jim Gray award for her contributions to eScience. She has keynoted twice already at IEEE eScience (2005, 2012), so this makes a hattrick.
  photo: eScience-26-keynote-goble.png


- name: '1st Workshop on Agentic AI for Large-scale Science (AGENT4SC)'
  abstract: >
            AGENT4SC focuses on the systems foundations required to operationalize agent decisions that directly affect allocations, system health, data movement, energy consumption, and scientific outcomes. This demands integrated data and metadata infrastructures spanning scalable databases, vector stores, caching layers, provenance services, and knowledge graphs, all designed to remain performant and auditable under high concurrency. At scale, even minor errors, hallucinations, or blind spots can escalate into megawatt-hour waste, irreproducibility, and compromised scientific validity. Therefore, this workshop provides a forum to advance scalable architectures, cross-continuum coordination, evaluation frameworks, verification and mitigation strategies, provenance and observability mechanisms, performance analysis, and lessons from real deployments. The workshop builds on active efforts in agentic AI for science across national laboratories, academia, and industry, reflecting an emerging and rapidly growing community.
  url: #

- name: 'AI Capability Uplift That Actually Works: International Case Studies from Academia, Government, Industry, and Faith-based Organisations (AI-CAPWORK)'
  abstract: >
            AI tools, models, and workflows are evolving faster than most organisations can adapt to their people, processes, technology stacks, and cultures. Technical training alone (for example, learning a specific model or tool) rarely delivers lasting productivity gains unless it is embedded into real workflows, decision making, governance, leadership, and organisational culture. This workshop examines what actually works in AI and data capability uplift programs—and what does not—through real world case studies from universities, government (at all levels), small and medium enterprises, the not-for-profit sector, and different religious congregations \ with examples spanning Australia, and Europe this workshop provides a truly international perspective. We will explore the gap between what leaders think their teams are doing with AI and what staff actually feel confident and supported to do. This will include the cultural and psychological conditions that make uplift efforts succeed or fail, the reusable lessons from building these programs across sectors so we stop reinventing the wheel, measure what matters, and better understand how the stories leaders and colleagues tell during AI transformation shape engagement, culture, and outcomes.
  url: #


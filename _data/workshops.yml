- name: 'Data-Driven and Physics-Informed eScience for Atmospheric Modelling and Air Quality'
  abstract: >
            The workshop focuses on the integration of data-driven methodologies, high-performance computing (HPC), and physics-based models for atmospheric science applications, with particular emphasis on air quality, climate interactions, and anthropogenic impacts. In recent years, atmospheric modelling has undergone a paradigm shift driven by the availability of large datasets (satellite observations, sensor networks), advances in machine learning, and the development of scalable computing infrastructures. These developments have enabled the emergence of hybrid approaches that combine numerical modelling, statistical inference, and artificial intelligence, leading to improved predictive capabilities and new scientific insights. The workshop aims to explore this transition from traditional modelling frameworks to integrated eScience approaches, emphasizing reproducibility, scalability, and interoperability.
  url: #
 
- name: '1st Workshop on Graph Data Science-Driven Knowledge Analysis (GDSKA’26)'
  abstract: >
            Graph-based technologies, including knowledge graphs, ontologies, graph databases, graph analytics, and graph machine learning, are emerging as powerful unifying abstractions across all stages of the scientific research lifecycle. This workshop explores how these technologies can be applied to represent and integrate knowledge, model workflow dependencies, enable semantic interoperability across heterogeneous datasets, and support resource discovery, reasoning, and orchestration in distributed computing environments, including HPC, Cloud, Edge, and IoT infrastructures spanning the computing continuum.
  url: #

- name: 'Modelling and Simulation at the Convergence of HPC, AI, and Data-Driven Science (HPCMS 2026)'
  abstract: >
            The development of computational models capable of simulating the behaviour and evolution of natural and engineered systems remains a cornerstone of modern science and engineering. Today, this paradigm is undergoing a profound transformation driven by the convergence of High Performance Computing (HPC), data-intensive science, and artificial intelligence.
            Within this evolving landscape, the HPCMS Workshop at eScience 2026 aims to bring together a multidisciplinary community of researchers, developers, and practitioners working at the intersection of modelling, simulation, and advanced computing. The workshop will provide a platform to discuss emerging methodologies, software ecosystems, and best practices for scalable, portable, and sustainable computational science.
  url: #

- name: 'cItizeN Science engagemenT based on Ict soLutions (INSTIL 2026)'
  abstract: >
            The INSTIL workshop aims to provide a venue for researchers and practitioners who design and develop ICT-based tools and eScience solutions supporting citizen engagement in scientific activities. The workshop will explore digital infrastructures for participation, collaborative platforms for data collection and analysis, and innovative approaches to science communication and stakeholder engagement. A particular focus of the workshop will be on applications related to environmental monitoring, climate science, and climate change, where citizen participation and distributed sensing infrastructures can significantly complement traditional scientific observations.
  url: #

- name: 'Workshop on Research Software Supply Chain Security (RS3)'
  abstract: >
            Modern scientific discovery depends on complex computational infrastructure composed of research software, dependencies, and distributed computing environments. These interconnected artifacts and actors form the research software supply chain (RSSC), a critical yet poorly understood component of the scientific cyberinfrastructure. While software supply chain security has received growing attention in industry, its implications for scientific infrastructure — where usability, openness, and rapid experimentation are essential — remain largely unexplored. This workshop will convene research software engineers, scientists, and cybersecurity researchers to examine the RSSC as a component of scientific infrastructure. Through peer-reviewed papers, panels, and interactive sessions, participants will share operational experiences, discuss usability–security tradeoffs, and identify emerging challenges such as autonomous scientific agents and trust in computational results. The workshop will generate a roadmap identifying technical, organizational, and community interventions needed to secure research software supply chain across the scientific ecosystem.
  url: #

- name: '2nd Workshop on Workflows, Intelligent Scientific Data, and Optimization for Automated Management (WISDOM 2026)'
  abstract: >
            Scientific automation is at the forefront of enabling faster, more reproducible discoveries in AI, exascale computing, and distributed environments. The WISDOM workshop provides a platform for researchers, developers, and practitioners to discuss advances in autonomous workflow design, intelligent data management, and scalable and agentic automation techniques. We are especially interested in innovative methods that integrate AI/ML to enhance the flexibility, efficiency, and reliability of scientific processe across heterogeneous environments.
  url: #